version: '3.8'

# ============================================
# Eagle Vision - Docker Compose
# Real-Time Equipment Utilization Pipeline
# ============================================

services:
  # ── Infrastructure ──

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: eagle-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok"
    ports:
      - "2181:2181"
    networks:
      - eagle-network
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: eagle-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_MESSAGE_MAX_BYTES: 2097152         # 2MB
      KAFKA_REPLICA_FETCH_MAX_BYTES: 2097152
      KAFKA_FETCH_MESSAGE_MAX_BYTES: 2097152
      KAFKA_MAX_REQUEST_SIZE: 2097152
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_RETENTION_BYTES: 536870912     # 512MB
    networks:
      - eagle-network
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: eagle-timescaledb
    environment:
      POSTGRES_DB: eagle_vision
      POSTGRES_USER: eagle
      POSTGRES_PASSWORD: eagle_vision_2024
    ports:
      - "5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - eagle-network
    healthcheck:
      test: pg_isready -U eagle -d eagle_vision
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Microservices ──

  frame-producer:
    build:
      context: ./services/frame_producer
      dockerfile: Dockerfile
    container_name: eagle-frame-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_RAW_FRAMES_TOPIC: raw-frames
      VIDEO_DIR: /app/sample_videos
      FRAME_SKIP: 3
      TARGET_FPS: 8
      FRAME_RESIZE_WIDTH: 1280
      FRAME_RESIZE_HEIGHT: 720
    volumes:
      - ./sample_videos:/app/sample_videos:ro
    networks:
      - eagle-network
    restart: unless-stopped

  cv-processor:
    build:
      context: ./services/cv_processor
      dockerfile: Dockerfile
    container_name: eagle-cv-processor
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_RAW_FRAMES_TOPIC: raw-frames
      KAFKA_EQUIPMENT_EVENTS_TOPIC: equipment-events
      KAFKA_ANNOTATED_FRAMES_TOPIC: annotated-frames
      YOLO_MODEL: yolo11m-seg.pt
      CONFIDENCE_THRESHOLD: 0.4
      MOTION_THRESHOLD: 2.0
      ARM_MOTION_THRESHOLD: 1.5
      TRACK_MOTION_THRESHOLD: 2.5
      STATE_DEBOUNCE_FRAMES: 5
      SLIDING_WINDOW_SIZE: 10
    # Uncomment below for GPU support (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - eagle-network
    restart: unless-stopped

  db-sink:
    build:
      context: ./services/db_sink
      dockerfile: Dockerfile
    container_name: eagle-db-sink
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_EQUIPMENT_EVENTS_TOPIC: equipment-events
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_DB: eagle_vision
      POSTGRES_USER: eagle
      POSTGRES_PASSWORD: eagle_vision_2024
      BATCH_SIZE: 50
      FLUSH_INTERVAL_SECONDS: 2.0
    networks:
      - eagle-network
    restart: unless-stopped

  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    container_name: eagle-dashboard
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_EQUIPMENT_EVENTS_TOPIC: equipment-events
      KAFKA_ANNOTATED_FRAMES_TOPIC: annotated-frames
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_DB: eagle_vision
      POSTGRES_USER: eagle
      POSTGRES_PASSWORD: eagle_vision_2024
      DASHBOARD_REFRESH_INTERVAL: 2
    networks:
      - eagle-network
    restart: unless-stopped

  video-sink:
    build:
      context: ./services/video_sink
      dockerfile: Dockerfile
    container_name: eagle-video-sink
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_ANNOTATED_FRAMES_TOPIC: annotated-frames
      OUTPUT_DIR: /app/output_videos
      TARGET_FPS: 8
    volumes:
      - ./output_videos:/app/output_videos
    networks:
      - eagle-network
    restart: unless-stopped

volumes:
  timescale-data:
    driver: local

networks:
  eagle-network:
    driver: bridge
